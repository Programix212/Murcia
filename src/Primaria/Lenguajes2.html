<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEARTEE - Lista de Juegos</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Lenguajes2.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">


  



</head>
<body>

  <!-- ========== FONDO ANIMADO ========== -->
  <div class="bg-animation">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- ========== CONTENEDOR PRINCIPAL ========== -->
  <div class="main-container">
    
    <!-- Header -->
    <header class="header">
      <button class="btn-back" onclick="goBack()">
        <span class="btn-icon">←</span>
        <span class="btn-text">Volver</span>
      </button>
      <div class="header-title">
        <span class="header-emoji"></span>
        <h1>Lenguajes</h1>
      </div>
      <div class="header-count">
        <span class="count-number">14</span>
        <span class="count-text">juegos</span>
      </div>
    </header>

    <!-- Barra de búsqueda -->
    <div class="search-bar" id="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="Buscar juego..." id="searchInput" onkeyup="filterGames()">
    </div>

    <!-- Lista de juegos -->
    <div class="games-list" id="gamesList">

         <!-- Mensaje sin resultados -->
    <div class="no-results" id="noResults">
      <span class="no-results-icon">🔍</span>
      <p>No se encontraron juegos</p>
    </div>

  </div>



  <script>
function abrirJuego(rutaZip, nombreJuego) {
    const actividad = encodeURIComponent(rutaZip);
    const nombre = encodeURIComponent(nombreJuego);
    // ✅ Pasa origen=Lenguajes.html en la URL
    window.location.href = `vista.html?actividad=${actividad}&nombre=${nombre}&origen=Lenguajes.html`;
}


  </script>

  <script src="Lenguajes2.js"></script>
   <script src="../aplicar-config.js"></script>
</body>
</html>
