<script>
  // ✅ Guardar datos en sessionStorage y navegar
  function abrirJuego(rutaZip, nombreJuego) {
    sessionStorage.setItem('juego_actividad', rutaZip);
    sessionStorage.setItem('juego_nombre', nombreJuego);
    sessionStorage.setItem('juego_origen', 'Delohumanocomunitario.html');
    window.location.href = 'vista.html';
  }

  function goBack() {
    window.location.href = 'Etapas.html';
  }

  function filterGames() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.game-card');
    let count = 0;

    cards.forEach(card => {
      const name = card.getAttribute('data-name')?.toLowerCase() || '';
      const title = card.querySelector('.game-title')?.textContent.toLowerCase() || '';
      const match = name.includes(query) || title.includes(query);
      card.style.display = match ? '' : 'none';
      if (match) count++;
    });

    document.getElementById('noResults').style.display = count === 0 ? '' : 'none';
    document.getElementById('gameCount').textContent = count;
  }
</script>
